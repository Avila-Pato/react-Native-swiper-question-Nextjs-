<svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Lavender bg: Felicidad -->
  <ellipse cx="30" cy="31" rx="26" ry="25" fill="#EDE9F8"/>
  <!-- Gauge arc (semicircle) -->
  <path d="M10 42 A22 22 0 0 1 50 42" fill="none" stroke="#C4B5FD" stroke-width="6" stroke-linecap="round"/>
  <!-- High end highlight -->
  <path d="M42 20 A22 22 0 0 1 50 42" fill="none" stroke="#7B6BB5" stroke-width="6" stroke-linecap="round"/>
  <!-- Center base -->
  <circle cx="30" cy="42" r="5" fill="#7B6BB5"/>
  <!-- Needle pointing high -->
  <path d="M30 42 L42 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick marks -->
  <circle cx="10" cy="42" r="2.5" fill="#C4B5FD"/>
  <circle cx="13" cy="28" r="2" fill="#C4B5FD"/>
  <circle cx="30" cy="20" r="2" fill="#C4B5FD"/>
  <circle cx="50" cy="42" r="2.5" fill="#7B6BB5"/>
  <!-- Star at high end -->
  <circle cx="50" cy="42" r="5" fill="#7B6BB5" opacity="0.2"/>
</svg>
