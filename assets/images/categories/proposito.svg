  <line x1="78" y1="114" x2="65" y2="138" stroke="#2D1F60" stroke-width="3" stroke-linecap="round"/>
  <!-- pierna adelante -->
  <line x1="78" y1="114" x2="94" y2="132" stroke="#2D1F60" stroke-width="3" stroke-linecap="round"/>
