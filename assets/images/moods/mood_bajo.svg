<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="24" fill="#7B6BB5"/>
  <!-- cejas tristes: esquinas internas más altas que las externas -->
  <path d="M28 43 L40 37" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M60 37 L72 43" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- ojos -->
  <circle cx="34" cy="51" r="4.5" fill="white"/>
  <circle cx="66" cy="51" r="4.5" fill="white"/>
  <!-- lágrima bajo el ojo izquierdo -->
  <path d="M34 57 Q31 63 34 68 Q37 63 34 57" fill="rgba(255,255,255,0.55)"/>
  <!-- boca triste -->
  <path d="M36 75 Q50 66 64 75" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
