<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="24" fill="#C0533A"/>

  <!-- cejas: extremos internos MÁS ALTOS que externos = gesto de preocupación/estrés -->
  <path d="M26 40 L40 34" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M60 34 L74 40" stroke="white" stroke-width="3.2" stroke-linecap="round"/>

  <!-- ojos muy abiertos (estrés/susto) -->
  <circle cx="34" cy="51" r="5.5" fill="white"/>
  <circle cx="66" cy="51" r="5.5" fill="white"/>
  <circle cx="34" cy="51" r="2.5" fill="#7A2A18"/>
  <circle cx="66" cy="51" r="2.5" fill="#7A2A18"/>

  <!-- boca abierta tensa: rectángulo redondeado, no sonrisa -->
  <rect x="37" y="66" width="26" height="12" rx="6" fill="white" opacity="0.9"/>
  <rect x="40" y="69" width="20" height="6" rx="3" fill="#7A2A18"/>

  <!-- gota de sudor -->
  <ellipse cx="76" cy="38" rx="3.5" ry="5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="76" cy="34" r="2" fill="rgba(255,255,255,0.55)"/>
</svg>
